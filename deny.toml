# cargo-deny 配置文件
# 用于检查项目依赖的安全性、许可证合规性、来源可信度
# 运行：cargo deny check
# 文档：https://embarkstudios.github.io/cargo-deny/

# ==================== 目标平台 ====================
# 指定要检查的目标平台，留空表示检查所有平台
targets = [
  #{ triple = "x86_64-unknown-linux-musl" },
  #{ triple = "wasm32-unknown-unknown", features = ["atomics"] },
]

# ==================== 安全公告检查 ====================
# 运行：cargo deny check advisories
# 检查依赖是否存在已知安全漏洞
[advisories]
# 安全公告数据库的本地缓存路径
db-path = "~/.cargo/advisory-db"
# 安全公告数据库的远程地址
db-urls = ["https://github.com/rustsec/advisory-db"]

# 发现安全漏洞时的处理方式
# deny = 编译失败 | warn = 警告但通过 | allow = 静默忽略
vulnerability = "deny"      # 已知漏洞：直接失败
unmaintained = "warn"       # 无人维护的 crate：警告
yanked = "warn"             # 被撤回的版本：警告
notice = "warn"             # 安全通知：警告

# 忽略特定的安全公告（填写公告 ID）
ignore = [
  #"RUSTSEC-0000-0000",
]

# 低于此 CVSS 分数的漏洞将被忽略
# None=0.0 | Low=0.1-3.9 | Medium=4.0-6.9 | High=7.0-8.9 | Critical=9.0-10.0
#severity-threshold =

# ==================== 许可证检查 ====================
# 运行：cargo deny check licenses
# 检查依赖的软件许可证是否合规
[licenses]
# 未检测到许可证的 crate 的处理方式
unlicensed = "allow"

# 允许的许可证列表（SPDX 标识符）
# 常见开源许可证：MIT、Apache-2.0、BSD、ISC、MPL-2.0
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "CC0-1.0",
]

# 明确禁止的许可证
deny = [
  #"Nokia",
]

# Copyleft 许可证的处理方式（如 GPL、AGPL）
# 这类许可证要求衍生作品也必须开源
copyleft = "warn"

# OSI 认证或 FSF 自由软件许可证的处理方式
# both = 同时满足 | either = 满足其一 | neither = 不自动判断
allow-osi-fsf-free = "neither"

# 不在 allow/deny 列表中、非 copyleft、非 OSI/FSF 的许可证：默认拒绝
default = "deny"

# 许可证文本匹配的置信度阈值（0.0 ~ 1.0）
confidence-threshold = 0.8

# 特定 crate 的许可证例外（允许为个别 crate 指定特殊许可证）
exceptions = [
  #{ allow = ["Zlib"], name = "adler32", version = "*" },
]

# 手动澄清 crate 的许可证信息（当自动检测失败时使用）
#[[licenses.clarify]]
#name = "ring"
#version = "*"
#expression = "MIT AND ISC AND OpenSSL"
#license-files = [
#{ path = "LICENSE", hash = 0xbd0eed23 }
#]

# 私有仓库 crate 的许可证检查
[licenses.private]
ignore = false              # 是否忽略未发布的 workspace crate
registries = [
  #"https://sekretz.com/registry
]

# ==================== 依赖禁用检查 ====================
# 运行：cargo deny check bans
# 检查是否引入了被禁止或重复的依赖
[bans]
# 检测到同一 crate 有多个版本时的处理方式
multiple-versions = "warn"

# 版本号为通配符 * 时的处理方式
wildcards = "allow"

# 生成依赖图时的高亮方式
# lowest-version = 高亮最低版本路径 | simplest-path = 高亮最短路径 | all = 两者都高亮
highlight = "all"

# 允许的 crate 白名单（谨慎使用）
allow = [
  #{ name = "ansi_term", version = "=0.11.0" },
]

# 禁止的 crate 黑名单
deny = [
  #{ name = "ansi_term", version = "=0.11.0" },
]

# 重复检测时跳过的 crate（不影响依赖图）
skip = [
  #{ name = "ansi_term", version = "=0.11.0" },
]

# 重复检测时跳过的依赖树（包含指定 crate 的所有传递依赖）
skip-tree = [
  #{ name = "ansi_term", version = "=0.11.0", depth = 20 },
]

# ==================== 来源检查 ====================
# 运行：cargo deny check sources
# 检查依赖的来源是否可信
[sources]
# 来自未知 registry 的 crate 的处理方式
unknown-registry = "warn"
# 来自未知 git 仓库的 crate 的处理方式
unknown-git = "warn"

# 允许的 crate registry 列表
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# 允许的 git 仓库列表
allow-git = []

# 允许的 GitHub/GitLab/Bitbucket 组织
[sources.allow-org]
github = []
gitlab = []
bitbucket = []
