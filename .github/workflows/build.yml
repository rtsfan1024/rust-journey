# CI 工作流：每次 push 或 PR 到 main 分支时自动运行代码质量检查
name: build

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    # 矩阵策略：为每个子项目独立运行一套完整的 CI 检查
    # 新增项目时只需在此列表中添加目录名
    strategy:
      matrix:
        project:
          - p000-template
          - p001-rustcli

    runs-on: ubuntu-latest

    # 默认工作目录：切换到当前矩阵对应的项目目录
    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      # 拉取仓库代码（fetch-depth: 0 获取完整历史，供 git-cliff 生成 changelog）
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 安装 Rust 稳定版工具链
      - name: Install Rust
        run: rustup toolchain install stable

      # 安装 cargo-llvm-cov：Rust 代码覆盖率工具（composite action，不走 Docker）
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # 安装 nextest：增强版测试运行器（composite action，不走 Docker）
      - name: Install nextest
        uses: taiki-e/install-action@nextest

      # 安装 git-cliff：changelog 生成工具（composite action，不走 Docker）
      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      # 缓存构建产物，加速后续 CI 运行
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.project }} -> target

      # 1. 格式检查：代码是否符合 rustfmt 规范
      - name: Check code format
        run: cargo fmt -- --check

      # 2. 编译检查：代码能否通过编译（不生成二进制文件）
      - name: Check the package for errors
        run: cargo check --all

      # 3. 静态分析：clippy 检查代码规范和潜在问题，警告视为错误
      - name: Lint rust sources
        run: cargo clippy --all-targets --all-features --tests --benches -- -D warnings

      # 4. 运行测试：使用 nextest 执行项目中的所有测试用例
      - name: Execute rust tests
        run: cargo nextest run --all-features --no-tests warn

      # 5. 生成 changelog 并创建 Release（仅在打 tag 时触发）
      - name: Generate changelog and create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # 生成 changelog
          changelog=$(git-cliff --latest --strip header)
          # 创建 GitHub Release
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "$changelog"
