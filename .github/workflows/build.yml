# CI 工作流：每次 push 或 PR 到 main 分支时自动运行代码质量检查
name: build

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        project:
          - p000-template
          - p001-rustcli
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        run: rustup toolchain install stable --component llvm-tools-preview

      # 安装 cargo-llvm-cov：Rust 代码覆盖率工具
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # 安装 nextest：增强版测试运行器
      - name: Install nextest
        uses: taiki-e/install-action@nextest

      # 缓存构建产物，加速后续 CI 运行
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.project }} -> target

      - name: Check code format
        run: cargo fmt -- --check

      - name: Check the package for errors
        run: cargo check --all

      - name: Lint rust sources
        run: cargo clippy --all-targets --all-features --tests --benches -- -D warnings

      - name: Execute rust tests
        run: cargo nextest run --all-features --no-tests warn

      # 5. 生成 changelog（仅在打 tag 时触发）
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v2
        id: git-cliff
        if: startsWith(github.ref, 'refs/tags/')
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md

      # 6. 创建 GitHub Release（仅在打 tag 时触发）
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ${{ steps.git-cliff.outputs.content }}
