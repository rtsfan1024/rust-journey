# CI 工作流：每次 push 或 PR 到 main 分支时自动运行代码质量检查
name: build

# 触发条件：push 到 main 分支，或向 main 分支提交 PR
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 权限：允许写入仓库内容（用于后续可能的 release 操作）
permissions:
  contents: write

jobs:
  build:
    # 矩阵策略：为每个子项目独立运行一套完整的 CI 检查
    # 新增项目时只需在此列表中添加目录名
    strategy:
      matrix:
        project:
          - p000-template
          - p001-rustcli

    # 运行环境：Ubuntu 最新版
    runs-on: ubuntu-latest

    # 默认工作目录：切换到当前矩阵对应的项目目录
    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      # 拉取仓库代码
      - uses: actions/checkout@v4

      # 安装 Rust 稳定版工具链（含 llvm-tools，供后续覆盖率等工具使用）
      - name: Install Rust
        run: rustup toolchain install stable --component llvm-tools-preview

      # 缓存构建产物，加速后续 CI 运行
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.project }} -> target

      # 1. 格式检查：代码是否符合 rustfmt 规范
      - name: Check code format
        run: cargo fmt -- --check

      # 2. 编译检查：代码能否通过编译（不生成二进制文件）
      - name: Check the package for errors
        run: cargo check --all

      # 3. 静态分析：clippy 检查代码规范和潜在问题，警告视为错误
      - name: Lint rust sources
        run: cargo clippy --all-targets --all-features --tests --benches -- -D warnings

      # 4. 运行测试：执行项目中的所有测试用例
      - name: Execute rust tests
        run: cargo test
