# git-cliff ~ 配置文件
# 用于从 git 提交记录自动生成 CHANGELOG.md
# 文档：https://git-cliff.org/docs/configuration

[changelog]
# changelog 文件的头部内容
header = """
# Changelog\n
All notable changes to this project will be documented in this file. See [conventional commits](https://www.conventionalcommits.org/) for commit guidelines.\n
"""

# changelog 正文模板（使用 Tera 模板引擎语法）
# https://keats.github.io/tera/docs/#introduction
body = """
---
{% if version %}\
    {% if previous.version %}\
        ## [{{ version | trim_start_matches(pat="v") }}]($REPO/compare/{{ previous.version }}..{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
    {% else %}\
        ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
    {% endif %}\
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") %}
        - **({{commit.scope}})**{% if commit.breaking %} [**breaking**]{% endif %} \
            {{ commit.message|trim }} - ([{{ commit.id | truncate(length=7, end="") }}]($REPO/commit/{{ commit.id }})) - {{ commit.author.name }}
    {%- endfor -%}
    {% raw %}\n{% endraw %}\
    {%- for commit in commits %}
        {%- if commit.scope -%}
        {% else -%}
            - {% if commit.breaking %} [**breaking**]{% endif %}\
                {{ commit.message|trim }} - ([{{ commit.id | truncate(length=7, end="") }}]($REPO/commit/{{ commit.id }})) - {{ commit.author.name }}
        {% endif -%}
    {% endfor -%}
{% endfor %}\n
"""

# changelog 文件的尾部内容
footer = """
<!-- generated by git-cliff -->
"""

# 去除模板中的首尾空白字符
trim = true

# 后处理器：替换模板中的占位符为实际值
postprocessors = [
    { pattern = '\$REPO', replace = "https://github.com/rtsfan1024/rust-journey" },
]

[git]
# 基于 Conventional Commits 规范解析提交信息
# 格式：<type>(<scope>): <description>
# 常见 type：feat(新功能)、fix(修复)、docs(文档)、refactor(重构)、test(测试)
conventional_commits = true

# 是否过滤掉不符合 Conventional Commits 规范的提交
filter_unconventional = false

# 是否将多行提交信息拆分为多个独立提交处理
split_commits = false

# 提交信息预处理（正则替换）
commit_preprocessors = [
    # 示例：将 issue 编号替换为 GitHub 链接
    # { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/orhun/git-cliff/issues/${2}))"},
]

# 提交分类规则：根据提交信息的前缀分组
commit_parsers = [
    { message = "\\[skip", skip = true },           # 跳过包含 [skip 的提交
    { message = "\\p{Han}", skip = true },           # 跳过包含中文的提交
    { message = "^feat", group = "Features" },       # feat 开头 → Features 分组
    { message = "^fix", group = "Bug Fixes" },       # fix 开头 → Bug Fixes 分组
    { message = "^doc", group = "Documentation" },   # doc 开头 → Documentation 分组
    { message = "^perf", group = "Performance" },    # perf 开头 → Performance 分组
    { message = "^refactor", group = "Refactoring" },# refactor 开头 → Refactoring 分组
    { message = "^style", group = "Style" },         # style 开头 → Style 分组
    { message = "^revert", group = "Revert" },       # revert 开头 → Revert 分组
    { message = "^test", group = "Tests" },          # test 开头 → Tests 分组
    { message = "^chore\\(version\\):", skip = true },# 跳过版本号 chore 提交
    { message = "^chore", group = "Miscellaneous Chores" }, # chore 开头 → Miscellaneous 分组
    { message = ".*", group = "Other" },             # 其余提交 → Other 分组
    { body = ".*security", group = "Security" },     # 正文含 security → Security 分组
]

# 是否保护 breaking changes 不被跳过规则过滤
protect_breaking_commits = false

# 是否过滤掉未被 commit_parsers 匹配到的提交
filter_commits = false

# 匹配的 git tag 格式（如 v1.0.0、v2.3.1）
tag_pattern = "v[0-9].*"

# 跳过的 tag（不会生成对应的 changelog 章节）
skip_tags = "v0.1.0-beta.1"

# 忽略的 tag
ignore_tags = ""

# 是否按拓扑顺序排列 tag（而非时间顺序）
topo_order = false

# 同一章节内提交的排序方式：oldest(从旧到新) / newest(从新到旧)
sort_commits = "oldest"

# 限制 changelog 中包含的最大提交数量（注释掉表示不限制）
# limit_commits = 42
